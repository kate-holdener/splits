name: Build and Release Executables

on:
  # Trigger on version tags
  push:
    tags:
      - 'v*.*.*'
  
  # Manual workflow dispatch
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} executable
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: macos-latest
            executable_name: IntervalTraining-macos
            build_script: scripts/build-macos.sh
          - os: windows-latest
            executable_name: IntervalTraining-windows.exe
            build_script: scripts/build-windows.bat
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          # Install pcsc-lite if available via Homebrew
          brew install pcsc-lite || echo "pcsc-lite install failed, continuing..."
      
      - name: Build executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          chmod +x ${{ matrix.build_script }}
          ${{ matrix.build_script }}
      
      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: ${{ matrix.build_script }}
      
      - name: Verify executable
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            ls -la "dist/${{ matrix.executable_name }}"
          else
            ls -la "dist/${{ matrix.executable_name }}"
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.executable_name }}
          path: dist/${{ matrix.executable_name }}
          retention-days: 90

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      
      - name: Display structure of downloaded files
        run: ls -R ./artifacts
      
      - name: Determine release version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            --title "Interval Training ${{ steps.version.outputs.version }}" \
            --notes "## Interval Training Application ${{ steps.version.outputs.version }}
            
            Cross-platform executable releases for the Interval Training application.
            
            ### Downloads
            - **macOS**: IntervalTraining-macos
            - **Windows**: IntervalTraining-windows.exe
            
            ### Features
            - Pywebview-based GUI with HTML/CSS interface
            - RFID and NFC reader support
            - Real-time interval timing and performance tracking
            - PDF report generation
            
            ### System Requirements
            - **macOS**: macOS 10.14+ (may require installing pcsc-lite: \`brew install pcsc-lite\`)
            - **Windows**: Windows 10+ (no additional requirements)
            
            ### Installation
            1. Download the appropriate executable for your platform
            2. Make executable (macOS): \`chmod +x IntervalTraining-macos\`
            3. Run the application
            
            **Note**: On first run, your system may show security warnings. On macOS, you may need to right-click and select \"Open\" to bypass Gatekeeper." \
            ./artifacts/IntervalTraining-macos/IntervalTraining-macos#IntervalTraining-macos \
            ./artifacts/IntervalTraining-windows.exe/IntervalTraining-windows.exe#IntervalTraining-windows.exe
