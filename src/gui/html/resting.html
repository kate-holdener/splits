<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resting Runners</title>
<!-- Google Fonts removed for outdoor readability - using system fonts -->
<link rel="stylesheet" href="../css/resting.css"/>
</head>
<body>

<!-- Theme toggle (fixed, visible on all screens) -->
<button id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">☀</button>

<div id="header">
  <div>
    <div class="logo">Resting <span>Runners</span></div>
  </div>
</div>

<div id="list-area">
  <div id="empty">
    <div class="icon">🏃‍♀️🏃‍♂️</div>
    <div class="msg">No Resting Athletes</div>
    <div class="sub">Athletes in rest period will appear here</div>
  </div>
</div>

<div id="footer">
  <div class="dot"></div>
  <span>LIVE FEED</span>
  <span id="last-update" style="margin-left:auto"></span>
</div>

<script>
const OVERDUE_THRESHOLD_S = 5;
const DEFAULT_REST_DURATION_S = 90;

function cardClass(secsLeft, duration){
  if(secsLeft <= 0)              return 'done';
  if(secsLeft / duration <= 0.2) return 'urgent';
  return '';
}

function runnerName(athlete){
  return (`${athlete.first_name||''} ${athlete.last_name||''}`).trim() || '—';
}

async function refresh(){
  try{
    const r = await pywebview.api.get_resting();
    if(!r){ setStatus('No response'); return; }
    if(!r.ok){ setStatus('Error: '+(r.msg||'unknown')); return; }

    const athletes = r.athletes || [];
    setStatus('Updated '+new Date().toLocaleTimeString());

    // Partition: still-resting / borderline (secsLeft >= -threshold) vs. clearly overdue (secsLeft < -threshold)
    const active = [], overdue = [];
    for(const athlete of athletes){
      const secsLeft = (athlete.rest_duration || DEFAULT_REST_DURATION_S) - (athlete.rest_elapsed || 0);
      if(secsLeft > 0 - OVERDUE_THRESHOLD_S){
        active.push(athlete);
      } else {
        overdue.push(athlete);
      }
    }

    const area = document.getElementById('list-area');

    if(!athletes.length){
      area.innerHTML = `
        <div id="empty">
          <div class="icon">🏃‍♀️🏃‍♂️</div>
          <div class="msg">No Resting Athletes</div>
          <div class="sub">Athletes in rest period will appear here</div>
        </div>`;
      return;
    }

    let html = active.map(athlete => {
      const elapsed  = athlete.rest_elapsed  || 0;
      const duration = athlete.rest_duration || DEFAULT_REST_DURATION_S;
      const secsLeft = duration - elapsed;
      const cls      = cardClass(secsLeft, duration);
      const label    = secsLeft <= 0 ? 'GO' : Math.ceil(Math.max(0, secsLeft));
      return `
        <div class="runner-card ${cls}">
          <div class="runner-info">
            <div class="runner-name">${runnerName(athlete)}</div>
          </div>
          <span class="countdown-num">${label}</span>
        </div>`;
    }).join('');

    if(overdue.length){
      html += `
        <div id="overdue-section">
          <div class="overdue-header">⚠ Overdue</div>
          ${overdue.map(athlete => `
            <div class="overdue-card">
              <span class="overdue-name">${runnerName(athlete)}</span>
              <span class="overdue-go">GO</span>
            </div>`).join('')}
        </div>`;
    }

    area.innerHTML = html;
  } catch(e){
    setStatus('Error: '+e.message);
  }
}

function setStatus(msg){
  document.getElementById('last-update').textContent = msg;
}

let _started = false;
function tryStart(){
  if(_started) return;
  if(window.pywebview && window.pywebview.api && window.pywebview.api.get_resting){
    _started = true;
    refresh();
    setInterval(refresh, 1000);
  } else {
    setTimeout(tryStart, 250);
  }
}
window.addEventListener('pywebviewready', tryStart);
tryStart();

// ============================================================
// THEME
// ============================================================
function applyTheme(mode){
  if(mode === 'light'){
    document.body.classList.add('light-mode');
    document.getElementById('theme-toggle').textContent = '🌙';
  } else {
    document.body.classList.remove('light-mode');
    document.getElementById('theme-toggle').textContent = '☀';
  }
}

function toggleTheme(){
  const isLight = document.body.classList.contains('light-mode');
  const next = isLight ? 'dark' : 'light';
  localStorage.setItem('intervaltrack-theme', next);
  applyTheme(next);
}

// Apply saved theme immediately on load (syncs with main window via localStorage)
(function(){
  const saved = localStorage.getItem('intervaltrack-theme') || 'dark';
  applyTheme(saved);
})();
</script>
</body>
</html>
