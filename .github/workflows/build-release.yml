name: Build and Release Executables

on:
  # Trigger on version tags
  push:
    tags:
      - 'v*.*.*'
  
  # Manual workflow dispatch
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} executable
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: macos-latest
            executable_name: Splits.app
            artifact_name: Splits-macos.zip
            build_script: scripts/build-macos.sh

          - os: windows-latest
            executable_name: Splits-installer.exe
            artifact_name: Splits-installer.exe
            build_script: scripts/build-windows.sh
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          # Install pcsc-lite if available via Homebrew
          brew install pcsc-lite || echo "pcsc-lite install failed, continuing..."

      - name: Build executable
        shell: bash
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_SENDER_NAME: ${{ secrets.SMTP_SENDER_NAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SENDER_EMAIL: ${{ secrets.SMTP_SENDER_EMAIL }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
        run: |
          chmod +x ${{ matrix.build_script }}
          ${{ matrix.build_script }}
      
      - name: Verify build output
        shell: bash
        run: ls -la "dist/${{ matrix.executable_name }}"

      - name: Zip app bundle (macOS only)
        if: matrix.os == 'macos-latest'
        run: zip -r "dist/${{ matrix.artifact_name }}" "dist/${{ matrix.executable_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 90

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      
      - name: Display structure of downloaded files
        run: ls -R ./artifacts
      
      - name: Determine release version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            --title "Splits ${{ steps.version.outputs.version }}" \
            --notes "## Splits ${{ steps.version.outputs.version }}

            ### Downloads
            - **macOS**: Splits-macos.zip
            - **Windows**: Splits-installer.exe (includes desktop shortcut and uninstaller)

            ### Features
            - Pywebview-based GUI with HTML/CSS interface
            - RFID and NFC reader support
            - Real-time interval timing and performance tracking
            - PDF report generation

            ### System Requirements
            - **macOS**: macOS 10.14+ (may require installing pcsc-lite: \`brew install pcsc-lite\`)
            - **Windows**: Windows 10+

            ### Installation
            - **macOS**: Download and unzip \`Splits-macos.zip\`, then open \`Splits.app\`
            - **Windows**: Download and run \`Splits-installer.exe\`

            **Note**: On first run, your system may show security warnings. On macOS, right-click and select \"Open\" to bypass Gatekeeper. On Windows, click \"More info\" then \"Run anyway\" if SmartScreen appears." \
            ./artifacts/Splits-macos.zip/Splits-macos.zip#Splits-macos.zip \
            ./artifacts/Splits-installer.exe/Splits-installer.exe#Splits-installer.exe
