<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Screen 2</title>
  <style>
    body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; background: #1e3a2e; color: #cdf4d6; gap: 1rem; }
    h1   { font-size: 2.5rem; margin-bottom: 0.5rem; }
    p    { color: #a6c8ad; }
    button { padding: 0.5rem 1.2rem; font-size: 1rem; cursor: pointer; border: none; border-radius: 6px; background: #a6e3a1; color: #1e3a2e; }
    button:hover { background: #94e2d5; }
    #output { color: #89dceb; font-size: 0.95rem; min-height: 1.4em; }
  </style>
</head>
<body>
  <h1>Screen 2</h1>
  <p>This is the second pywebview window.</p>
  <button onclick="doPing()">Ping Python</button>
  <button onclick="doIncrement()">Increment shared counter</button>
  <button onclick="doGetCounter()">Read counter</button>
  <div id="output">—</div>
  <script>
    function show(msg) {
      document.getElementById('output').textContent = msg;
    }
    async function doPing() {
      const r = await pywebview.api.ping('Screen 2');
      show(r.msg);
    }
    async function doIncrement() {
      const r = await pywebview.api.increment();
      show('counter = ' + r.counter);
    }
    async function doGetCounter() {
      const r = await pywebview.api.get_counter();
      show('counter = ' + r.counter);
    }
  </script>
</body>
</html>
